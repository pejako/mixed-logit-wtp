name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Sundays at 03:00 UTC -- run the slow parameter-recovery tests weekly
    - cron: "0 3 * * 0"
  workflow_dispatch:
    # Allow manual triggering with optional slow-test selection
    inputs:
      run_slow:
        description: "Run the slow parameter-recovery tests"
        required: false
        default: "false"

jobs:
  fast:
    name: Fast tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check mixedlogit tests

      - name: Run fast tests
        run: pytest tests/ -m "not slow" --cov=mixedlogit --cov-report=term-missing

  slow:
    name: Slow recovery tests
    # Only run slow tests on the weekly schedule or manual dispatch with the
    # opt-in flag set. Skipping on every push keeps PR feedback under a minute.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_slow == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run slow parameter-recovery tests
        run: pytest tests/ -m "slow" -v

  r-parity:
    name: R parity (mlogit ↔ Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install Python dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate canonical dataset and Python results
        working-directory: python
        run: |
          python -m mixedlogit.export_csv
          python scripts/export_results.py

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          packages: |
            any::mlogit
            any::dfidx
            any::jsonlite
            any::testthat

      - name: Run R parity tests
        working-directory: r
        run: |
          R -e 'testthat::test_dir("tests/testthat", reporter = "summary", stop_on_failure = TRUE)'

  pages:
    name: Build and publish dashboard to GitHub Pages
    # Only publish on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: fast
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Render headline figures
        run: python scripts/render_figures.py

      - name: Render decision dashboard
        run: python scripts/render_dashboard.py

      - name: Render notebooks to HTML
        run: |
          jupyter nbconvert --to html notebooks/01_dgp_and_mnl_baseline.ipynb \
            --output-dir ../docs/notebooks
          jupyter nbconvert --to html notebooks/02_mixed_logit_estimation.ipynb \
            --output-dir ../docs/notebooks
          jupyter nbconvert --to html notebooks/03_elasticities_and_substitution.ipynb \
            --output-dir ../docs/notebooks
          jupyter nbconvert --to html notebooks/04_wtp_and_feature_preference.ipynb \
            --output-dir ../docs/notebooks

      - name: Build the Pages site index
        working-directory: .
        run: |
          cat > docs/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8">
          <title>Mixed Logit Choice Lab</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
                   max-width: 800px; margin: 3em auto; padding: 0 1em; line-height: 1.6; color: #222; }
            h1 { color: #2c3e50; border-bottom: 3px solid #4C78A8; padding-bottom: .3em; }
            ul { line-height: 2; }
            a { color: #4C78A8; }
          </style></head><body>
          <h1>Mixed Logit Choice Lab</h1>
          <p>Synthetic discrete-choice data, an SML estimator, and cross-language
          parity with R's <code>mlogit</code>. See
          <a href="https://github.com/${{ github.repository }}">the repository</a>
          for source code.</p>
          <h2>Decision dashboard</h2>
          <ul>
            <li><a href="dashboard.html">Decision dashboard</a> — single-page summary with all key tables and plots</li>
          </ul>
          <h2>Executed notebooks</h2>
          <ul>
            <li><a href="notebooks/01_dgp_and_mnl_baseline.html">01 — Data generation and MNL baseline</a></li>
            <li><a href="notebooks/02_mixed_logit_estimation.html">02 — Mixed Logit estimation and parameter recovery</a></li>
            <li><a href="notebooks/03_elasticities_and_substitution.html">03 — Elasticities and the IIA failure</a></li>
            <li><a href="notebooks/04_wtp_and_feature_preference.html">04 — Willingness to pay and feature ranking</a></li>
          </ul>
          <h2>Methodology</h2>
          <ul>
            <li><a href="methodology.html">Methodology writeup (math-first, ~15-min read)</a></li>
          </ul>
          </body></html>
          EOF

      - name: Render methodology to HTML
        run: |
          pip install markdown
          python -c "
          import markdown
          from pathlib import Path
          md_text = Path('../docs/methodology.md').read_text()
          html_body = markdown.markdown(md_text, extensions=['tables', 'fenced_code'])
          full_html = '''<!DOCTYPE html>
          <html><head><meta charset=\"utf-8\"><title>Methodology</title>
          <style>
          body { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Helvetica, sans-serif;
                 max-width: 850px; margin: 2em auto; padding: 0 1em; line-height: 1.6; color: #222; }
          h1, h2, h3 { color: #2c3e50; }
          h1 { border-bottom: 3px solid #4C78A8; padding-bottom: .3em; }
          h2 { border-bottom: 1px solid #ddd; padding-bottom: .2em; margin-top: 2em; }
          code { background: #f0f0f0; padding: .1em .3em; border-radius: 3px; font-size: .9em; }
          pre { background: #f4f4f4; padding: 1em; overflow-x: auto; }
          table { border-collapse: collapse; margin: 1em 0; }
          th, td { padding: .5em .8em; border-bottom: 1px solid #ddd; text-align: left; }
          th { background: #f0f0f0; }
          blockquote { border-left: 4px solid #4C78A8; padding: .5em 1em; background: #fafafa; margin: 1em 0; }
          </style></head><body>''' + html_body + '''</body></html>'''
          Path('../docs/methodology.html').write_text(full_html)
          print('Wrote docs/methodology.html')
          "

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
