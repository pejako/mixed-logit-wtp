name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Sundays at 03:00 UTC -- run the slow parameter-recovery tests weekly
    - cron: "0 3 * * 0"
  workflow_dispatch:
    # Allow manual triggering with optional slow-test selection
    inputs:
      run_slow:
        description: "Run the slow parameter-recovery tests"
        required: false
        default: "false"

jobs:
  fast:
    name: Fast tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check mixedlogit tests

      - name: Run fast tests
        run: pytest tests/ -m "not slow" --cov=mixedlogit --cov-report=term-missing

  slow:
    name: Slow recovery tests
    # Only run slow tests on the weekly schedule or manual dispatch with the
    # opt-in flag set. Skipping on every push keeps PR feedback under a minute.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_slow == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run slow parameter-recovery tests
        run: pytest tests/ -m "slow" -v

  r-parity:
    name: R parity (mlogit ↔ Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install Python dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate canonical dataset and Python results
        working-directory: python
        run: |
          python -m mixedlogit.export_csv
          python scripts/export_results.py

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          packages: |
            any::mlogit
            any::dfidx
            any::jsonlite
            any::testthat

      - name: Run R parity tests
        working-directory: r
        run: |
          R -e 'testthat::test_dir("tests/testthat", reporter = "summary", stop_on_failure = TRUE)'
